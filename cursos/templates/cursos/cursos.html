{% extends 'base.html' %}

{% block title %}Página de Cursos{% endblock %}

{% block content %}
<div class="container mt-4">
    <h1 class="text-center mb-4">Bienvenido a la página de Cursos</h1>
    
    <div class="text-end mb-4">
        <a class="btn btn-secondary" href="{% url 'cursos:cursoFormulario' %}">Agregar Curso</a>
    </div>
    <div class="row justify-content-center mb-5">
        <div class="col-md-6 col-lg-5">
            <form action="{% url 'cursos:buscar' %}" method="GET" class="d-flex shadow-sm">
                <input class="form-control me-2" type="number" name="camada" placeholder="Buscar por número de camada..." required>
                <button class="btn btn-outline-success" type="submit">
                    <i class="bi bi-search"></i> Buscar
                </button>
            </form>
        </div>
    </div>
    <div class="row">
        {% for curso in cursos %}
            <div class="col-md-4 col-sm-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title text-primary">{{ curso.nombre }}</h5>
                        <p class="card-text"><strong>Camada:</strong> {{ curso.camada }}</p>
                    </div>
                </div>
            </div>
        {% empty %}
            <div class="col-12">
                <p class="text-muted text-center">No hay cursos disponibles todavía.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
